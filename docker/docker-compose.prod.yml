services:
  app-queue-consumer:
    depends_on:
      - redis
    deploy:
      rollback_config:
        order: start-first
      update_config:
        order: start-first
    env_file:
      - ./app/.env
      - ./app/.env.local
    image: ghcr.io/buzzingpixel/site-backups-queue-consumer
    environment:
      HOSTNAME: buzzingpixel-site-backups-queue-consumer
    volumes:
      - type: bind
        source: /Users/tj/.ssh/id_rsa
        target: /root/.ssh/id_rsa
      - type: bind
        source: /Users/tj/.ssh/id_rsa.pub
        target: /root/.ssh/id_rsa.pub
      - type: bind
        source: /Volumes/ivy-ext-01/site-backups
        target: /storage

  app-schedule-runner:
    depends_on:
      - redis
    deploy:
      rollback_config:
        order: start-first
      update_config:
        order: start-first
    env_file:
      - ./app/.env
      - ./app/.env.local
    image: ghcr.io/buzzingpixel/site-backups-schedule-runner
    environment:
      HOSTNAME: buzzingpixel-site-backups-schedule-runner
    volumes:
      - type: bind
        source: /Users/tj/.ssh/id_rsa
        target: /root/.ssh/id_rsa
      - type: bind
        source: /Users/tj/.ssh/id_rsa.pub
        target: /root/.ssh/id_rsa.pub
      - type: bind
        source: /Volumes/ivy-ext-01/site-backups
        target: /storage

  redis:
    image: redis
    volumes:
      - redis-volume:/data
    networks:
      default:
        aliases:
          - buzzingpixel-site-backups-redis

volumes:
  redis-volume:
